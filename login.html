<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Les Arcanes de Mélanie</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@400;500;600;700&display=swap">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Design Tokens -->
  <link rel="stylesheet" href="css/variables.css">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg-primary);
      font-family: var(--font-ui);
      color: var(--color-text-primary);
      padding: var(--space-sm);
    }

    .login {
      width: 100%;
      max-width: 420px;
    }

    .login__card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: var(--space-md);
    }

    .login__header {
      text-align: center;
      margin-bottom: var(--space-md);
    }

    .login__icon {
      font-size: 2.5rem;
      color: var(--color-gold);
      margin-bottom: var(--space-xs);
    }

    .login__brand {
      font-family: var(--font-display);
      font-size: var(--text-small);
      color: var(--color-text-secondary);
      letter-spacing: 0.05em;
    }

    .login__title {
      font-family: var(--font-display);
      font-size: var(--text-h2);
      color: var(--color-gold);
      margin-top: var(--space-xs);
    }

    .login__form {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .login__field {
      position: relative;
    }

    .login__input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 248, 231, 0.05);
      border: 1px solid rgba(255, 248, 231, 0.15);
      border-radius: var(--radius-sm);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-body);
      transition: var(--transition);
      outline: none;
    }

    .login__input::placeholder {
      color: var(--color-text-secondary);
    }

    .login__input:focus {
      border-color: var(--color-gold);
      box-shadow: 0 0 0 2px rgba(212, 160, 23, 0.15);
    }

    .login__field--password .login__input {
      padding-right: 48px;
    }

    .login__toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text-secondary);
      font-size: 1.25rem;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: var(--transition-fast);
    }

    .login__toggle-password:hover {
      color: var(--color-gold);
    }

    .login__submit {
      width: 100%;
      padding: 14px;
      background-color: var(--color-gold);
      color: var(--color-text-dark);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-ui);
      font-size: var(--text-body);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: var(--space-xs);
    }

    .login__submit:hover:not(:disabled) {
      background-color: var(--color-gold-light);
    }

    .login__submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login__error {
      display: none;
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.4);
      color: var(--color-danger);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: var(--text-small);
      text-align: center;
    }

    .login__error.visible {
      display: block;
    }

    .login__footer {
      text-align: center;
      margin-top: var(--space-md);
    }

    .login__back-link {
      color: var(--color-text-secondary);
      font-size: var(--text-small);
      text-decoration: none;
      transition: var(--transition-fast);
    }

    .login__back-link:hover {
      color: var(--color-gold);
    }

    @media (min-width: 480px) {
      .login__card {
        padding: var(--space-md) 2.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="login">
    <div class="login__card">
      <div class="login__header">
        <div class="login__icon">
          <i class="ph ph-star-four"></i>
        </div>
        <p class="login__brand">Les Arcanes de Mélanie</p>
        <h1 class="login__title">Espace Administrateur</h1>
      </div>

      <form class="login__form" id="loginForm">
        <div class="login__field">
          <input
            type="email"
            class="login__input"
            id="loginEmail"
            placeholder="Email"
            autocomplete="email"
            required
          >
        </div>

        <div class="login__field login__field--password">
          <input
            type="password"
            class="login__input"
            id="loginPassword"
            placeholder="Mot de passe"
            autocomplete="current-password"
            required
          >
          <button type="button" class="login__toggle-password" id="togglePassword" aria-label="Afficher le mot de passe">
            <i class="ph ph-eye" id="eyeIcon"></i>
          </button>
        </div>

        <div class="login__error" id="loginError">
          Email ou mot de passe incorrect
        </div>

        <button type="submit" class="login__submit" id="submitBtn">
          Se connecter
        </button>
      </form>

      <div class="login__footer">
        <a href="index.html" class="login__back-link">Retour au site</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (function () {
      // If already authenticated, redirect to dashboard
      if (Auth.isAuthenticated()) {
        window.location.href = 'dashboard.html';
        return;
      }

      var form = document.getElementById('loginForm');
      var emailInput = document.getElementById('loginEmail');
      var passwordInput = document.getElementById('loginPassword');
      var toggleBtn = document.getElementById('togglePassword');
      var eyeIcon = document.getElementById('eyeIcon');
      var errorBox = document.getElementById('loginError');
      var submitBtn = document.getElementById('submitBtn');

      // Password visibility toggle
      toggleBtn.addEventListener('click', function () {
        var isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeIcon.className = isPassword ? 'ph ph-eye-slash' : 'ph ph-eye';
      });

      // Form submission
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        errorBox.classList.remove('visible');

        // Loading state
        submitBtn.disabled = true;
        submitBtn.textContent = 'Connexion...';

        try {
          var success = await Auth.login(emailInput.value, passwordInput.value);

          if (success) {
            window.location.href = 'dashboard.html';
          } else {
            errorBox.classList.add('visible');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Se connecter';
          }
        } catch (err) {
          errorBox.classList.add('visible');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Se connecter';
        }
      });
    })();
  </script>

</body>
</html>
